<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
  <title>TerraLeap Assistant</title>

  <style>
    body { font-family: Arial; }

    /* Floating button */
    #chat-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      background: #2c7be5;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 22px;
    }

    /* Chatbox */
    #chatbox {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 340px;
      background: #111;
      color: white;
      border-radius: 12px;
      display: none;
      overflow: hidden;
    }

    #header {
      background: #2c7be5;
      padding: 10px;
      font-weight: bold;
    }

    #messages {
      height: 300px;
      overflow-y: auto;
      padding: 10px;
    }

    /* NEW FLEX MESSAGE SYSTEM */
    .msg {
      display: flex;
      margin: 6px 0;
    }

    .msg.user {
      justify-content: flex-end;
    }

    .msg.bot {
      justify-content: flex-start;
    }

    .bubble {
      padding: 8px;
      border-radius: 8px;
      max-width: 75%;
    }

    .user .bubble {
      background: #2c7be5;
    }

    .bot .bubble {
      background: #333;
    }

    #options {
      padding: 10px;
    }

    #options button {
      margin: 4px;
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #input-area {
      display: flex;
      padding: 10px;
      background: #222;
    }

    #input {
      flex: 1;
      padding: 6px;
      border-radius: 6px;
      border: none;
    }

    #send {
      margin-left: 5px;
      padding: 6px 10px;
      background: #2c7be5;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- Chat Button -->
<div id="chat-toggle">💬</div>

<!-- Chatbox -->
<div id="chatbox">
  <div id="header">TerraLeap Assistant 🎓</div>
  <div id="messages"></div>
  <div id="options"></div>

  <div id="input-area">
    <input id="input" placeholder="Type here..." />
    <button id="send">Send</button>
  </div>
</div>

<script>
const API = "http://127.0.0.1:8000";
let sessionId = null;

let isOpen = false;

// Toggle chat
document.getElementById("chat-toggle").onclick = () => {
  isOpen = !isOpen;
  document.getElementById("chatbox").style.display = isOpen ? "block" : "none";
};

// Add message (FIXED)
function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.className = "msg " + sender;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = text;

  msg.appendChild(bubble);
  document.getElementById("messages").appendChild(msg);

  document.getElementById("messages").scrollTop =
    document.getElementById("messages").scrollHeight;
}

//Bot typing
function botTyping(text) {
  let i = 0;
  let current = "";

  const interval = setInterval(() => {
    current += text[i];

    // update last bot message OR create new one
    let msgs = document.getElementById("messages");
    let last = msgs.lastElementChild;

    if (!last || !last.querySelector(".bot")) {
      const msg = document.createElement("div");
      msg.className = "msg";

      const bubble = document.createElement("div");
      bubble.className = "bot";
      msg.appendChild(bubble);

      msgs.appendChild(msg);
      last = msg;
    }

    last.querySelector(".bot").innerText = current;

    i++;

    if (i >= text.length) {
      clearInterval(interval);
    }
  }, 15);
}

// Render options
function renderOptions(options) {
  const container = document.getElementById("options");
  container.innerHTML = "";

  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => handleUserInput(opt);
    container.appendChild(btn);
  });
}

// Handle user input
async function handleUserInput(input) {
  addMessage(input, "user");

  const res = await fetch(API + "/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      sessionId: sessionId,
      answer: input
    })
  });

  const data = await res.json();

  botTyping(data.message);

  renderOptions(data.options || []);

  // CTA support
  if (data.cta) {
    const btn = document.createElement("button");
    btn.innerText = "Start Now 🚀";
    btn.style.background = "#2c7be5";
    btn.style.color = "white";
    btn.style.marginTop = "10px";

    btn.onclick = () => {
      window.open(data.cta, "_blank");
    };
    
      document.getElementById("options").appendChild(btn);
  }
}

// Send input
document.getElementById("send").onclick = () => {
  const input = document.getElementById("input");
  const value = input.value.trim();
  if (!value) return;

  input.value = "";
  handleUserInput(value);
};

// Enter key support
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    document.getElementById("send").click();
  }
});

// Initial message
async function startChat() {
  const res = await fetch(API + "/start", {
    method: "POST"
  });

  const data = await res.json();

  sessionId = data.sessionId;

  botTyping(data.message);
  renderOptions(data.options);
}

startChat();
</script>

</body>
</html>
